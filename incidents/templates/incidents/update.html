{% extends 'incidents/base.html' %}

{% block content %}
<h2>Update Incident</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" value="{{ incident.title }}" class="form-control mb-2">
    <textarea name="description" class="form-control mb-2">{{ incident.description }}</textarea>

    <select name="priority" class="form-select mb-3">
        <option value="Critical" {% if incident.priority == 'Critical' %}selected{% endif %}>P1 - Critical</option>
        <option value="High" {% if incident.priority == 'High' %}selected{% endif %}>P2 - High</option>
        <option value="Medium" {% if incident.priority == 'Medium' %}selected{% endif %}>P3 - Medium</option>
        <option value="Low" {% if incident.priority == 'Low' %}selected{% endif %}>P4 - Low</option>
    </select>

    <select name="status" class="form-select mb-3">
        <option value="Open" {% if incident.status == 'Open' %}selected{% endif %}>Open</option>
        <option value="In Progress" {% if incident.status == 'In Progress' %}selected{% endif %}>In Progress</option>
        <option value="On Hold" {% if incident.status == 'On Hold' %}selected{% endif %}>On Hold</option>
        <option value="Resolved" {% if incident.status == 'Resolved' %}selected{% endif %}>Resolved</option>
    </select>

    <button class="btn btn-primary">Update</button>
</form>
{% endblock %}
